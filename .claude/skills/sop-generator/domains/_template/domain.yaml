# 领域配置模板

domain:
  id: your_domain_id
  name: 领域显示名称
  version: "1.0.0"
  description: 领域一句话描述


# 节点字段补全提示词（用于AI自动补全详情时参考）
ai_completion_hints:
  input_desc: "该步骤需要接收什么信息或数据作为输入"
  output_desc: "该步骤处理完成后会输出什么结果"
  business_logics: "该步骤具体要执行哪些操作或判断"
  complete_condition: "什么条件下可以认为该步骤已完成"

# 约束规则
constraints:
  - name: 示例约束
    rules:
      - 约束规则描述

# 字段映射
mapping:
  步骤名称: name
  步骤描述: desc
  业务逻辑: businessLogics
  完成标准: completeCondition.businessRule
  输入: input.desc
  输出: output.desc

# 完成提示
completion_message: |
  根据你反馈的内容，我已经为你整理生成业务流程 SOP，同时生成了每个阶段对应的输入输出、业务逻辑及完成标准。若有任何需要调整、补充或修改的地方，你可以随时告诉我，或直接在右侧面板进行修改。
