domain:
  id: xuzhi
  name: 需智
  description: 以企业自身需求为牵引，推动需求从模糊到清晰的智能化工具
  constraintPaperId: 63391
# -----------------------------------------------------------------------------
# 一、领域核心定义
# -----------------------------------------------------------------------------
core_definitions:
  required_capability:
    name: 需要的能力
    definition: 客户需求明确了清晰的意图后，转化为对供给方能力的需求，即完成需求所需的具体能力表达
    essence: 从"企业需要什么"出发，而非"供方能提供什么"

# -----------------------------------------------------------------------------
# 二、核心应用场景（适用边界）
# -----------------------------------------------------------------------------
applicable_scenarios:
  scenario_1:
    name: 只知道"有问题"，不知道"问题在哪"
    description: 企业感知经营痛点（成本高、客户流失、效率低），但无法准确描述问题根源，更无法判断该从哪个方向入手解决
    process: 深度信息收集 → 企业画像构建 → 需求诊断结论

  scenario_2:
    name: 知道"想做什么"，不知道"做到什么程度"
    description: 企业已有大致方向（如想做数字化转型、想上系统），但缺乏量化目标，无法判断投入是否合理、方案是否达标
    process: 需求指标维度生成 → 将模糊意图转化为可衡量的量化指标（如降低多少成本、提升多少效率）

  scenario_3:
    name: 知道"要什么结果"，不知道"需要供方具备什么能力"
    description: 企业已明确目标，但在向外部供应商表达需求时，只能描述期望结果，无法指明供方需具备哪些专项能力，导致供需双方沟通成本高、方案偏差大
    process: 清晰意图解析 → 结构化需能力列表 → 精准表达对供给方的能力要求

# -----------------------------------------------------------------------------
# 三、约束规则（核心治理规则）
# -----------------------------------------------------------------------------
constraints:
  # --- 原有约束 ---
  - "需求模型必须包含三层：客户需求（画像与意图）、需求指标（量化衡量维度）、需要的能力（供给方能力要求）"
  - "三层之间必须保持逐层推导关系，不允许跨层跳跃或凭空生成"
  - "必须站在需求侧角度，以企业自身需求为唯一牵引，不允许携带任何供给侧色彩"
  - "生产型企业判断必须包含明确的业务特征词或行业"

  # --- 需求模型完整性约束 ---
  - "需智的分析链路必须完整包含需求模型的三个核心层次，三者缺一不允许进入下游流程"
  - "客户需求、需求指标、需要的能力之间必须保持逐层推导关系，不允许存在断链"
  - "每个模糊意图必须推导出对应的需求指标，每组需求指标必须解析出对应的需要的能力"

  # --- 需求侧解决方案约束 ---
  - "需智输出链路上必须包含从需求侧视角形成的解决方案，该方案须基于清晰意图与需能力列表生成，阐明客户希望通过何种路径达成何种目标"
  - "需求侧解决方案必须在需能力列表确认后方可生成，不允许在需求尚未清晰时提前输出"
  - "需求侧解决方案作为向下游传递的必要输出，不允许缺失"

  # --- 需求侧立场约束（严格禁止供给侧色彩） ---
  - "整个分析过程必须严格站在需求侧角度进行，以企业自身需求为唯一牵引"
  - "需要的能力的生成逻辑必须从'企业需要什么'出发，不允许以'市场上有什么'或'供方能提供什么'反向影响需求推导"
  - "模糊意图、需求指标、需要的能力的生成过程中，不允许出现以供方产品、方案或能力引导或锚定客户需求的表述"

  # --- 企业战略对齐约束 ---
  - "整个分析过程不得偏离企业战略，模糊意图的推导及清晰意图的生成均必须以企业战略为校验基准"
  - "若用户补充或调整的内容与企业战略存在明显偏离，系统须给出提示，由用户主动确认后方可保存"

# -----------------------------------------------------------------------------
# 四、字段生成规范
# -----------------------------------------------------------------------------
field_specs:
  name:
    description: "节点业务动作，动词+业务对象"
    examples: ["初步信息收集", "生成客户画像", "生成需求指标", "解析需要的能力", "生成需求侧解决方案"]
    tips: "体现代办事项，如'收集XX'、'生成XX'、'确认XX'、'解析XX'。避免使用供给侧色彩的动词如'推荐方案'、'介绍产品'"

  desc:
    description: "节点业务目标一句话描述"
    examples: ["基于客户信息生成问卷并收集，对生产型企业触发深度挖掘", "将清晰意图解析为结构化的需要的能力列表", "基于清晰意图与需能力列表生成需求侧解决方案"]
    tips: "说清楚：基于什么输入，通过什么动作，产生什么业务价值。必须体现需求侧视角，不允许描述为'帮助供应商了解客户'"

  input:
    description: "完成此节点需要的业务对象类型（从schema_meta定义的对象池中选择）"
    examples:
      - "客户行业、客户基本信息、企业战略"           # 基础信息
      - "模糊意图列表"                               # 引用约束元：模糊的意图
      - "清晰意图、需求价值指标"                      # 引用约束元：清晰的意图 + 需求价值指标
      - "需能力列表"                                  # 引用约束元：需要的能力
    tips: |
      从schema_meta.md定义的对象类型中选择：
      模糊的意图、目标客群、需求价值指标、特征标签、清晰的意图、需要的能力
      生成的是对象类型名称，不是对象属性

  output:
    description: "节点输出的业务对象类型（必须是schema_meta中定义的对象类型）"
    examples:
      - "客户画像、模糊意图列表"                      # 模糊的意图
      - "需求价值指标、特征标签"                      # 需求价值指标 + 特征标签
      - "需要的能力列表、需求侧解决方案"               # 需要的能力
    tips: |
      输出必须是约束元中定义的对象类型，确保节点间对象流转一致性

  businessLogics:
    description: "在此节点中应依据的逻辑或条件进行判断与操作"
    format: "列表格式，每条一个业务步骤"
    examples:
      - "1、问卷生成：基于输入生成问卷清单"
      - "2、收集方式选择：提供多种方式供用户选择"
      - "3、企业类型判断：若为生产型企业则触发深度挖掘"
      - "4、需求三层推导：确保模糊意图→需求指标→需要的能力的逐层推导"
      - "5、需求侧立场校验：检查是否存在供给侧色彩表述，严禁出现'供方产品''供应商方案'等"
      - "6、战略对齐校验：验证内容是否偏离企业战略，如有偏离提示用户确认"
      - "7、解决方案生成：基于清晰意图与需能力列表，阐明客户希望通过何种路径达成何种目标"
    tips: |
      用业务语言描述步（步骤需要标识序号）。关键校验点：
      1. 生产型企业判断关键词：生产/制造/加工/装配/产线/设备/工厂
      2. 需求侧立场：严禁供给侧表述，必须从"企业需要什么"出发
      3. 三层推导：模糊意图→需求指标→需要的能力必须逐层可见，不允许断链
      4. 战略对齐：每一步输出必须以企业战略为校验基准

  completeCondition:
    description: "在此节点完成所需的业务规则与数据规则"
    format: '{ "businessRule": "完成标准1\n完成标准2" }'
    examples:
      - '{ "businessRule": "产出达成：具体产出已完成并确认\n用户确认：用户已完成确认动作\n分支闭环：特殊分支条件已处理\n..." }'
    tips: |
      必须是对象格式，禁止字符串或数组。用业务验收角度描述。必检项：
      1. 是否完成三层推导（客户需求→需求指标→需要的能力），无断链
      2. 是否生成需求侧解决方案（必须在需能力列表确认后）
      3. 是否通过需求侧立场校验（无供给侧色彩）
      4. 是否通过战略对齐校验（符合企业战略或用户确认偏离）

  gatewayRules:
    description: "条件网关节点"
    format: "数组格式，每个元素是一个json对象，表示一个条件分支"
    example:
      - "{\"ruleText\": \"条件分支1\", \"targetNodeId\": \"目标节点id\"}"
      - "{\"ruleText\": \"条件分支2\", \"targetNodeId\": \"目标节点id\"}"

# -----------------------------------------------------------------------------
# 五、用户引导规则
# -----------------------------------------------------------------------------
user_guidance_rules:
  principle: "我为你做了什么 + 下一步能做什么"
  requirements:
    - "在每次交互节点主动对用户进行引导"
    - "确保用户在任意节点都清楚当前进展与后续路径"
    - "引导语言须简洁明确，避免专业术语堆砌"
    - "让用户在无需理解底层逻辑的情况下也能顺畅推进流程"
    - "在需要用户做出判断或确认的关键节点，辅助用户做出合理决策"
    - "不允许在用户未充分知情的情况下自动推进"

# -----------------------------------------------------------------------------
# 六、关键校验清单（生成节点时自检）
# -----------------------------------------------------------------------------
validation_checklist:
  demand_model_integrity:
    name: "需求模型完整性校验"
    items:
      - "检查是否包含客户需求层（画像与意图）"
      - "检查是否包含需求指标层（量化衡量维度）"
      - "检查是否包含需要的能力层（供给方能力要求）"
      - "检查三层之间是否存在逐层推导关系（客户需求→需求指标→需要的能力）"
      - "检查是否存在断链（如只有需求指标而无需要的能力，或只有需要的能力而无需求指标支撑）"

  demand_side_position:
    name: "需求侧立场校验"
    items:
      - "检查是否严格从'企业需要什么'出发"
      - "检查是否出现'市场上有什么''供方能提供什么'等供给侧表述"
      - "检查是否出现供方产品、方案、能力引导或锚定客户需求的表述"
      - "检查是否携带供给侧色彩（如'推荐供应商方案''介绍产品功能'）"

  solution_completeness:
    name: "需求侧解决方案完整性校验"
    items:
      - "检查是否生成需求侧视角的解决方案（非供给侧方案推荐）"
      - "检查解决方案是否基于清晰意图与需能力列表生成"
      - "检查解决方案是否在需能力列表确认后生成（不允许提前输出）"
      - "检查解决方案是否阐明客户希望通过何种路径达成何种目标"

  strategic_alignment:
    name: "企业战略对齐校验"
    items:
      - "检查内容是否偏离企业战略方向"
      - "检查用户调整是否通过战略偏离提示并获用户确认"
      - "检查模糊意图推导及清晰意图生成是否以企业战略为校验基准"

# -----------------------------------------------------------------------------
# 七、完整节点示例
# -----------------------------------------------------------------------------
node_example:
  name: "初步信息收集"
  desc: "基于客户信息生成问卷并收集，对生产型企业触发深度挖掘。严格站在需求侧角度，以企业战略为基准。"
  input: "客户行业、客户基本信息、企业战略"
  output: "客户画像、模糊意图列表"
  businessLogics:
    - "1、问卷生成：基于输入生成问卷清单，聚焦企业自身痛点而非市场解决方案"
    - "2、收集方式选择：提供多种方式供用户选择"
    - "3、企业类型判断：若为生产型企业（含生产/制造/加工/装配/产线/设备关键词）则触发深度挖掘"
    - "4、战略对齐校验：验证收集内容与企业战略方向是否一致，如有偏离提示用户确认"
    - "5、需求侧立场校验：确保问题设计从'企业需要什么'出发，不出现供给侧引导"
    - "6、引导规则：告知用户已完成的动作和下一步（我为你做了什么+下一步能做什么）"
  completeCondition:
    businessRule: "初步信息收集表已生成并确认\n生产型企业：深度知识挖掘摘要已生成\n战略对齐校验：收集内容与企业战略方向一致，或用户已确认偏离\n需求侧立场校验：确认无供给侧色彩表述"

node_example_capability:
  name: "解析需要的能力"
  desc: "基于清晰意图和需求指标，从需求侧视角解析企业对供给方的能力要求，生成结构化的需要的能力列表及需求侧解决方案"
  input: "清晰意图、需求价值指标、特征画像、企业战略"
  output: "需要的能力列表、需求侧解决方案"
  businessLogics:
    - "1、清晰意图解析：提取企业对供给方的核心要求，从'企业需要什么'出发"
    - "2、需求指标映射：将量化指标转化为能力维度，保持推导链条"
    - "3、需求侧立场校验：确保从'企业需要什么'出发，排除'供方能提供什么'的反向干扰"
    - "4、能力列表生成：输出结构化的需要的能力，每项能力须对应需求指标支撑"
    - "5、战略对齐校验：验证能力要求是否偏离企业战略，如有偏离提示用户确认"
    - "6、解决方案生成：基于清晰意图与需能力列表，阐明客户希望通过何种路径达成何种目标（需求侧视角，非供给侧方案推荐）"
    - "7、引导规则：告知用户已完成需能力解析及解决方案生成，明确后续可进入供方匹配或方案细化"
  completeCondition:
    businessRule: "需要的能力列表已生成：每项能力有对应的需求指标支撑，无断链\n需求侧解决方案已生成：基于清晰意图与需能力列表，阐明达成路径与目标\n生成顺序校验：需求侧解决方案在需能力列表确认后生成，非提前输出\n需求侧立场确认：严格从'企业需要什么'出发，无供给侧色彩表述\n战略对齐确认：能力要求及解决方案与企业战略一致，或用户已确认偏离"

# -----------------------------------------------------------------------------
# 八、完成提示
# -----------------------------------------------------------------------------
completion_message: |
  已为您生成需智 SOP，内容按业务语义组织：
  - 节点名称体现业务动作（需求侧视角）
  - 节点描述说明业务目标（从企业需要什么出发）
  - 输入输出列出具体业务对象（遵循需求模型三层结构：客户需求→需求指标→需要的能力）
  - 业务逻辑描述业务步骤和关键校验（三层推导完整性、需求侧立场校验、战略对齐校验）
  - 完成标准从业务验收角度定义（必检项：三层推导无断链、需求侧立场无偏离、战略对齐已确认、需求侧解决方案已输出）

  核心约束已内置：
  ✓ 需求模型三层推导完整性（客户需求→需求指标→需要的能力，不允许跨层跳跃或断链）
  ✓ 严格需求侧立场（从"企业需要什么"出发，禁止供给侧色彩表述）
  ✓ 企业战略对齐校验（推导及生成以企业战略为基准，偏离需用户确认）
  ✓ 需求侧解决方案必输出（基于清晰意图与需能力列表，阐明达成路径）

  如需调整，请随时告知或在右侧面板修改。