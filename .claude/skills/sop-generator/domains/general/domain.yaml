# 通用领域配置

domain:
  id: general
  name: 通用
  description: 适用于各类业务流程的通用领域配置

# 字段生成规范
field_specs:
  name:
    description: "节点业务动作，动词+业务对象"
    examples: ["需求收集", "方案设计", "结果输出", "信息确认"]
    tips: "体现代办事项，如'收集XX'、'设计XX'、'确认XX'"

  desc:
    description: "节点业务目标一句话描述"
    examples: ["基于输入信息完成业务处理并输出结果"]
    tips: "说清楚：基于什么输入，通过什么动作，产生什么业务价值"

  input:
    description: "完成此节点需要具备的条件或输入"
    examples: ["业务需求", "基础信息", "前置处理结果"]
    tips: "列出具体的业务对象，如'需求文档'、'申请表单'"

  output:
    description: "完成此节点后应得到的结果或产出"
    examples: ["处理结果", "确认信息", "交付物"]
    tips: "列出具体的业务产出物，这些产出会被下游节点使用"

  businessLogics:
    description: "在此节点中应依据的逻辑或条件进行判断与操作"
    format: "列表格式，每条一个业务步骤"
    examples:
      - "信息收集：获取必要的输入数据"
      - "条件判断：根据业务规则进行分支处理"
      - "业务处理：执行核心操作"
      - "结果输出：生成下游所需的产出"
    tips: "用业务语言描述步骤，体现业务逻辑而非技术实现"

  completeCondition:
    description: "在此节点完成所需的业务规则与数据规则"
    format: "列表格式，每条一个完成标准"
    examples:
      - "产出达成：具体产出已完成并确认"
      - "用户确认：用户已完成确认动作"
      - "分支闭环：特殊分支条件已处理"
    tips: "用业务验收角度描述，如'表单已填写并确认'"

  gatewayRules:
    description: "条件网关节点"
    format: "数组格式，每个元素是一个json对象，表示一个条件分支"
    example:
      - "{\"ruleText\": \"条件分支1\", \"targetNodeId\": \"目标节点id\"}"
      - "{\"ruleText\": \"条件分支2\", \"targetNodeId\": \"目标节点id\"}"

# 约束规则
constraints:
  - "节点间输入输出保持逻辑连贯"
  - "每个节点需有明确的业务产出"
  - "业务流程需有清晰的起点和终点"
  - "条件分支需覆盖完整场景"

# 字段映射
mapping:
  步骤名称: name
  步骤描述: desc
  业务逻辑: businessLogics
  完成标准: completeCondition.businessRule
  输入: input.desc
  输出: output.desc

# 完整节点示例
node_example:
  name: "需求收集"
  desc: "收集业务需求的基础信息，为后续处理提供输入。"
  input: "业务背景、目标诉求、基础条件"
  output: "需求清单、约束条件"
  businessLogics:
    - "信息收集：获取业务背景和目标"
    - "需求梳理：整理核心需求点"
    - "优先级排序：确定处理顺序"
  completeCondition:
    - "需求清单已确认"
    - "约束条件已明确"

# 完成提示
completion_message: |
  已为您生成通用 SOP，内容按业务语义组织：
  - 节点名称体现业务动作
  - 节点描述说明业务目标
  - 输入输出列出具体业务对象
  - 业务逻辑描述业务步骤和判断
  - 完成标准从业务验收角度定义

  如需调整，请随时告知或在右侧面板修改。
